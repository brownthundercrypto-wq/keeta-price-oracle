name: CI

# Run the hermetic test suite on every push and pull request. No secrets, no network at test time
# (tests mock sources/fetch + use in-memory SQLite and a throwaway keypair), no deploy.
# `npm test` is `node --test`, which recursively discovers BOTH the server tests (test/) and the
# client SDK tests (sdk/test/) — the SDK resolves @keetanetwork/* from the root node_modules.
on:
  push:
  pull_request:

jobs:
  test:
    name: node --test (Node 22.x)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
